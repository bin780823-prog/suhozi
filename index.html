<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수호전 - 웹 플레이어</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0800; color:#c8b080; font-family:'Malgun Gothic',sans-serif; display:flex; flex-direction:column; align-items:center; min-height:100vh; }
header { width:100%; max-width:1040px; padding:18px 24px 10px; display:flex; align-items:center; gap:16px; border-bottom:1px solid #2a1f00; }
header h1 { font-size:20px; font-weight:700; letter-spacing:4px; color:#e8d070; }
header span { font-size:12px; color:#2a1f00; letter-spacing:2px; }
.screen-wrap { position:relative; margin:24px auto 0; width:1024px; max-width:calc(100vw - 32px); border:1px solid #2a1f00; background:#000; aspect-ratio:4/3; overflow:hidden; }
#jsdos { display:block; width:100%!important; height:100%!important; image-rendering:pixelated; }
#loading-overlay { position:absolute; inset:0; background:#0a0800; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px; z-index:10; }
.loading-title { font-size:28px; font-weight:700; letter-spacing:8px; color:#e8d070; }
.loading-sub { font-size:12px; letter-spacing:3px; color:#2a1f00; }
.progress-bar { width:320px; height:3px; background:#2a1f00; border-radius:2px; overflow:hidden; }
.progress-fill { height:100%; background:#e8d070; border-radius:2px; width:0%; transition:width 0.3s; }
#status-text { font-size:11px; color:#2a1f00; letter-spacing:1px; min-height:16px; }
.controls { width:1024px; max-width:calc(100vw - 32px); margin:12px auto 0; display:flex; gap:8px; align-items:center; }
.btn { padding:7px 16px; background:transparent; border:1px solid #2a1f00; color:#e8d070; font-size:12px; cursor:pointer; border-radius:2px; transition:all 0.15s; font-family:inherit; letter-spacing:1px; }
.btn:hover { border-color:#e8d070; background:#0a0800; }
.hint { margin-left:auto; font-size:11px; color:#2a1f00; }
#save-badge { font-size:10px; color:#e8d070; opacity:0; transition:opacity 0.5s; padding:4px 10px; border:1px solid #2a1f00; border-radius:2px; }
footer { margin:24px auto; font-size:10px; color:#2a1f00; letter-spacing:2px; }
#error-box { display:none; position:absolute; inset:0; background:#0a0800; flex-direction:column; align-items:center; justify-content:center; gap:16px; z-index:20; text-align:center; padding:32px; }
#error-box h2 { color:#a04030; font-size:16px; }
#error-box p { color:#6a4a3a; font-size:12px; line-height:1.8; white-space:pre-line; }
</style>
</head>
<body>
<header><h1>水 滸 傳</h1><span>SUIKODEN · KOEI 1993</span></header>
<div class="screen-wrap" id="screen-wrap">
  <canvas id="jsdos"></canvas>
  <div id="loading-overlay">
    <div class="loading-title">水 滸 傳</div>
    <div class="loading-sub">SUIKODEN</div>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <div id="status-text">초기화 중...</div>
  </div>
  <div id="error-box"><h2>⚠ 실행 오류</h2><p id="error-detail"></p></div>
</div>
<div class="controls">
  <button class="btn" onclick="toggleFullscreen()">전체화면</button>
  <button class="btn" onclick="restartGame()">재시작</button>
  <span id="save-badge">💾 저장됨</span>
  <span class="hint">패스워드: <b style="color:#e8d070">10000</b></span>
</div>
<footer>KOEI 1993 · js-dos 6.22 · 세이브 데이터 IndexedDB 자동 보존</footer>
<script src="./js-dos.js"></script>
<script>
var o=document.getElementById('loading-overlay'),eb=document.getElementById('error-box'),
    ed=document.getElementById('error-detail'),fp=document.getElementById('progress-fill'),
    st=document.getElementById('status-text'),sb=document.getElementById('save-badge');
function sp(p,m){fp.style.width=p+'%';st.textContent=m;}
function se(m){o.style.display='none';eb.style.display='flex';ed.textContent=m;}
function showSave(){sb.style.opacity='1';setTimeout(function(){sb.style.opacity='0';},2000);}

window.addEventListener('load',function(){
  if(typeof Dos==='undefined'){se('js-dos.js 로드 실패.');return;}
  sp(10,'DOSBox 초기화 중...');
  var base=window.location.href.replace(/\/[^\/]*$/,'/');

  Dos(document.getElementById('jsdos'),{
    wdosboxUrl: base+'wdosbox.js',
  }).ready(function(fs,main){
    sp(40,'세이브 데이터 복원 중...');

    // 핵심: mountPoint를 '/game'으로 지정 → IDBFS 자동 마운트 → IndexedDB 자동 보존
    fs.extract(base+'game.zip', '/game').then(function(){
      sp(90,'게임 실행 중...');
      return main(['-c', 'KOEI.COM']);
    }).then(function(){
      o.style.display='none';
      // syncFs가 내부적으로 5초마다 자동 실행되므로 별도 처리 불필요
      // 저장 알림을 위해 주기적으로 배지 표시
      setInterval(showSave, 30000);
    }).catch(function(e){se('오류: '+(e.message||String(e)));}); 
  }).catch(function(e){se('DOSBox 오류: '+(e.message||String(e)));}); 
});

function toggleFullscreen(){
  var w=document.getElementById('screen-wrap');
  if(!document.fullscreenElement)(w.requestFullscreen||w.webkitRequestFullscreen).call(w);
  else(document.exitFullscreen||document.webkitExitFullscreen).call(document);
}
function restartGame(){if(confirm('재시작하시겠습니까?'))location.reload();}
</script>
</body>
</html>
